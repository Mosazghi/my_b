name: Run tests

on:
    push:

jobs:
    build:
        name: Build on Ubuntu
        runs-on: ubuntu-latest
        env:
            VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
            VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-binary-cache,readwrite"

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Create vcpkg binary cache directory
              run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

            - name: Cache vcpkg binary packages
              uses: actions/cache@v4
              with:
                  path: ${{ github.workspace }}/.vcpkg-binary-cache
                  key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
                  restore-keys: |
                      ${{ runner.os }}-vcpkg-

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    ccache cmake ninja-build pkg-config \
                    libgl1-mesa-dev libx11-dev libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
                    libssl-dev libfreetype-dev \
                    autoconf autoconf-archive automake libtool lcov

            - name: Setup vcpkg
              uses: lukka/run-vcpkg@v11
              with:
                  vcpkgJsonGlob: "**/vcpkg.json"

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1
              with:
                  key: ${{ runner.os }}-ccache
                  max-size: 500M

            - name: Cache CMake FetchContent
              uses: actions/cache@v4
              with:
                  path: build/_deps
                  key: ${{ runner.os }}-fetchcontent-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
                  restore-keys: |
                      ${{ runner.os }}-fetchcontent-

            - name: Configure
              run: |
                  cmake --preset=default \
                    -DCMAKE_BUILD_TYPE=Debug \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    -DENABLE_COVERAGE=ON

            - name: Build
              run: cmake --build build --target tests -- -j $(nproc)

            - name: Run test
              run: ctest --test-dir build --output-on-failure -j $(nproc)

            - name: Upload Coverage to Codecov
              run: |
                  ./cov.sh
                  bash <(curl -s https://codecov.io/bash) -f coverage.info -t "e7c89a65-272f-4c0a-93a4-cb2f4b28554a" || echo "Codecov did not collect coverage reports"
